name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release:
    # Only run when CI passed on a push to main.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0

    - name: Read version from manifest
      id: ver
      run: echo "version=$(jq -r .version manifest.json)" >> $GITHUB_OUTPUT

    - name: Check whether this version is already released
      id: tag_check
      run: |
        if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.version }}" | grep -q .; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "Tag ${{ steps.ver.outputs.version }} already exists — skipping release."
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Use Node.js
      if: steps.tag_check.outputs.skip == 'false'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      if: steps.tag_check.outputs.skip == 'false'
      run: npm install

    - name: Build
      if: steps.tag_check.outputs.skip == 'false'
      run: npm run build

    - name: Create GitHub Release
      if: steps.tag_check.outputs.skip == 'false'
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        tag_name: ${{ steps.ver.outputs.version }}
        name: "v${{ steps.ver.outputs.version }}"
        generate_release_notes: true
        files: |
          main.js
          manifest.json
          styles.css
